<!doctype html>
<html lang="en">

<head>
  <!-- Character Encoding -->
  <meta charset="UTF-8" />

  <!-- Viewport for Responsive Design -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Page Title -->
  <title>Contributors | Cara</title>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="ui-fix.css" />
  <link rel="stylesheet" href="contributors.css" />
  <link rel="stylesheet" href="header-fix.css" />

  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>

<body>
  <!-- HEADER -->
  <section id="header">
    <a href="index.html">
      <img id="siteLogo" src="images/oldlogo.png" alt="Cara Logo" />
    </a>

    <div id="navbar-container"></div>

    <div class="mobile">
      <a href="cart.html"><i class="ri-shopping-bag-4-line"></i></a>
      <i class="fas fa-outdent" id="bar"></i>
      <!-- Theme Toggle -->
      <button class="theme-toggle" id="themeToggleMobile" aria-label="Toggle dark mode">
        <i class="ri-moon-line" id="themeIconMobile"></i>
      </button>
    </div>
  </section>

  <main class="contributors-page">
    <!-- HERO -->
    <section class="contributors-hero">
      <div class="hero-content">
        <span class="contributors-badge"> Open Source Community </span>

        <h1>Meet Our Amazing Contributors</h1>

        <p>
          The incredible people helping improve Cara through open-source
          collaboration and innovation.
        </p>
      </div>
    </section>

    <!-- GRID -->
    <section class="contributors-container section-p1">
      <div id="contributorsGrid" class="contributors-grid">
        <!-- Dynamic Contributors -->
      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer id="footer"></footer>

  <script src="js/footer.js"></script>
  <script src="navbar.js"></script>
  <script src="js/fetch-timeout.js"></script>
  <script src="contributors.js"></script>

  <script>
    loadNavbar('contributors');
  </script>
</body>

</html>
