<!DOCTYPE html>
<html lang="en">

<head>
    <body>

        <script>
            document.body.setAttribute(
                "data-theme",
                localStorage.getItem("theme") || "light"
            );
        </script>
    <!-- Character Encoding -->
    <meta charset="UTF-8">
    
    <!-- Viewport for Responsive Design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist — Cara</title>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="ui-fix.css" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />

    <!-- inline style extracted -->
</head>

<body>

    <!-- Header Section -->
    <header class="header-section">
        <div class="header-inner">
            <div>
                <span class="wishlist-eyebrow"><i class="ri-heart-fill" aria-hidden="true"></i> Curated picks</span>
                <h1>Wishlist</h1>
                <p>Keep your favorite Cara pieces in one polished place, then move them to cart when the moment feels right.</p>
            </div>
                <a href="shop.html" class="btn-secondary"><i class="ri-arrow-left-line" aria-hidden="true"></i> Back to Shop</a>
                <button id="clearAllBtn" class="btn-danger-outline" onclick="clearWishlist()"><i class="ri-delete-bin-6-line" aria-hidden="true"></i> Clear All</button>
                <button class="theme-toggle btn-secondary" id="themeToggle" aria-label="Toggle dark mode" style="padding: 8px 12px; border-radius: 999px;">
                  <i class="ri-moon-line" id="themeIcon"></i>
                </button>
            </div>
        </div>
    </header>

    <main>
        <div class="wishlist-container" id="wishlistContainer" aria-live="polite"></div>
    </main>

    <script src="products.js"></script>

    <!-- Wishlist Sharing Utility -->
    <div style="max-width: 1200px; margin: 20px auto; padding: 0 20px; text-align: center;">
      <button onclick="shareWishlist()" style="background: #088178; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 16px;">
        <i class="ri-share-line"></i> Copy Shareable Wishlist Link
      </button>
    </div>
    <script>
    function shareWishlist() {
      const items = localStorage.getItem("wishlist") || "[]";
      const encoded = btoa(items);
      const shareUrl = `${window.location.origin}${window.location.pathname}?import=${encoded}`;
      navigator.clipboard.writeText(shareUrl).then(() => {
        alert("Wishlist sharing link copied to clipboard!");
      });
    }
    </script>
    <!-- Global Toast Component -->
    <div id="toast">
        <i class="ri-checkbox-circle-line" style="color: #088178; font-size: 20px;"></i>
        <span id="toast-msg">Item added to cart!</span>
    </div>

    <script>
        const wishlistContainer = document.getElementById("wishlistContainer");
        const clearAllBtn = document.getElementById("clearAllBtn");

        function parseStoredList(key) {
            try {
                return JSON.parse(localStorage.getItem(key)) || [];
            } catch {
                return [];
            }
        }

        function parsePriceString(priceStr) {
            if (typeof priceStr === 'number') return Number.isFinite(priceStr) ? priceStr : 0;
            if (!priceStr) return 0;
            return parseFloat(String(priceStr).replace(/[₹$\s,]/g, '')) || 0;
        }

        function formatRupee(amount) {
            const value = parsePriceString(amount);
            return '₹' + Math.round(value).toLocaleString('en-IN');
        }

        function hasPriceDropped(item) {
            return (
                typeof item.currentPrice === 'number' &&
                typeof item.previousPrice === 'number' &&
                item.currentPrice < item.previousPrice
            );
        }

        function getPriceDropAmount(item) {
            return hasPriceDropped(item) ? item.previousPrice - item.currentPrice : 0;
        }

        function normalizeWishlistItem(item) {
            const rawPrice = item.price || '₹0';
            const currentPrice = typeof item.currentPrice === 'number'
                ? item.currentPrice
                : parsePriceString(rawPrice);
            const previousPrice = typeof item.previousPrice === 'number'
                ? item.previousPrice
                : currentPrice;

            return {
                id: item.id || item.name,
                name: item.name || "Product",
                brand: item.brand || "Cara",
                price: formatRupee(currentPrice),
                image: item.image || item.img || "images/products/f1.jpg",
                currentPrice,
                previousPrice,
            };
        }

        function getWishlistItems() {
            if (typeof window.getWishlist === 'function') {
                return window.getWishlist();
            }

            const items = parseStoredList("wishlist");
            return Array.isArray(items) ? items.map(normalizeWishlistItem) : [];
        }

        function saveWishlistItems(items) {
            if (typeof window.saveWishlist === 'function') {
                return window.saveWishlist(items);
            }

            localStorage.setItem("wishlist", JSON.stringify(items.map(normalizeWishlistItem)));
            if (typeof window.updateWishlistCount === 'function') window.updateWishlistCount();
        }

        let wishlist = getWishlistItems();

        function showLocalToast(msg) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-msg');
            toastMsg.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function renderWishlist() {
            wishlistContainer.innerHTML = '';
            if (wishlist.length === 0) {
                clearAllBtn.style.display = 'none';
                wishlistContainer.style.display = 'block';
                wishlistContainer.innerHTML = `
                    <div class="empty-state">
                        <i class="ri-heart-pulse-line"></i>
                        <h2>Your wishlist is empty</h2>
                        <p>Explore our premium collections and add products you love to your personal wishlist!</p>
                        <a href="shop.html">Start Shopping</a>
                    </div>
                `;
            } else {
                clearAllBtn.style.display = 'inline-block';
                wishlistContainer.style.display = 'grid';
                wishlist.forEach((product, index) => {
                    const card = document.createElement("article");
                    card.className = "wishlist-card";
                    card.dataset.id = product.id;

                    const media = document.createElement("div");
                    media.className = "wishlist-media";

                    const image = document.createElement("img");
                    image.src = product.image;
                    image.alt = product.name;
                    image.loading = "lazy";

                    const savedPill = document.createElement("span");
                    savedPill.className = "saved-pill";
                    savedPill.innerHTML = '<i class="ri-heart-fill" aria-hidden="true"></i> Saved';

                    media.append(image, savedPill);
                    card.appendChild(media);

                    const details = document.createElement("div");
                    details.className = "wishlist-details";
                    const brand = document.createElement("span");
                    brand.className = "wishlist-brand";
                    brand.textContent = product.brand;
                    const title = document.createElement("h3");
                    title.textContent = product.name;
                    const price = document.createElement("p");
                    price.textContent = product.price;

                    details.append(brand, title, price);

                    if (hasPriceDropped(product)) {
                        const dropBadge = document.createElement("span");
                        dropBadge.className = "price-drop-pill";
                        dropBadge.textContent = `Price dropped by ${formatRupee(getPriceDropAmount(product))}`;
                        details.appendChild(dropBadge);
                    }

                    card.appendChild(details);

                    const actions = document.createElement("div");
                    actions.className = "card-actions";

                    const cartButton = document.createElement("button");
                    cartButton.className = "add-to-cart-btn";
                    cartButton.type = "button";
                    cartButton.setAttribute("aria-label", `Add ${product.name} to cart`);
                    cartButton.innerHTML = '<i class="ri-shopping-cart-2-line" aria-hidden="true"></i> Add to Cart';
                    cartButton.addEventListener("click", () => moveToCart(index));

                    const removeButton = document.createElement("button");
                    removeButton.className = "remove-icon-btn";
                    removeButton.type = "button";
                    removeButton.setAttribute("aria-label", `Remove ${product.name} from wishlist`);
                    removeButton.innerHTML = '<i class="ri-delete-bin-line" aria-hidden="true"></i>';
                    removeButton.addEventListener("click", () => removeItem(index));

                    actions.append(cartButton, removeButton);
                    card.appendChild(actions);
                    wishlistContainer.appendChild(card);
                });
            }
        }

        function removeItem(index) {
            const removedItem = wishlist[index].name;
            wishlist.splice(index, 1);
            saveWishlistItems(wishlist);
            renderWishlist();
            showLocalToast(`${removedItem} removed from wishlist`);
        }

        function clearWishlist() {
            if (confirm("Are you sure you want to clear your entire wishlist?")) {
                wishlist = [];
                saveWishlistItems(wishlist);
                renderWishlist();
                showLocalToast("Wishlist cleared completely!");
            }
        }

        function moveToCart(index) {
            const product = wishlist[index];

            let cart = parseStoredList("productsInCart");
            const existingItem = cart.find(item => item.name === product.name);
            if (existingItem) {
                existingItem.quantity = (existingItem.quantity || 1) + 1;
            } else {
                cart.push({
                    name: product.name,
                    price: product.price,
                    img: product.image,
                    quantity: 1,
                    size: "M",
                    id: Date.now()
                });
            }
            localStorage.setItem("productsInCart", JSON.stringify(cart));

            wishlist.splice(index, 1);
            saveWishlistItems(wishlist);
            renderWishlist();
            showLocalToast(`${product.name} added to cart!`);
        }

        renderWishlist();
    </script>

<script src="js/wishlist-notes.js" defer></script>
</body>
</html>
