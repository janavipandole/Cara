<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Forgot Password | Cara</title>

    <link rel="icon" href="images/favicon.jpg" />

    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="toast.css" />
    <link rel="stylesheet" href="forgotPassword.css" />
  </head>

  <body>
    <!-- HEADER -->
    <section id="header">
      <a href="index.html">
        <img src="images/logo.png" alt="Cara Logo" />
      </a>

      <ul id="navbar">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="login.html" id="login-btn">Login</a></li>
      </ul>
    </section>

    <!-- FORGOT SECTION -->
    <section id="forgot-section">
      <div class="auth-card">
        <a href="index.html" class="back-button">&#8592; Back to Shop</a>

        <h2>Forgot Password</h2>

        <p class="subtitle">Enter your email to reset your password 🔒</p>

        <form id="forgotForm" novalidate>
          <!-- STEP 1: IDENTIFICATION -->
          <div id="forgotStep1" class="forgot-step">
            <!-- EMAIL -->
            <div class="form-group">
              <label for="forgotEmail">Email Address</label>
              <input
                type="email"
                id="forgotEmail"
                name="email"
                placeholder="Enter registered email address"
                autocomplete="email"
                required
                aria-required="true"
                aria-label="Email Address"
              />
            </div>
            <!-- NEXT BUTTON -->
            <button
              type="button"
              id="forgotNextBtn"
              class="btn-primary"
              style="margin-top: 10px"
            >
              NEXT
            </button>
          </div>

          <!-- STEP 2: CHALLENGE & PASSWORD RESET (Initially Hidden) -->
          <div id="forgotStep2" class="forgot-step" style="display: none">
            <!-- SECURITY QUESTION CHALLENGE -->
            <div class="form-group">
              <label
                id="securityQuestionLabel"
                style="font-weight: 700; color: var(--accent)"
                >Security Question:</label
              >
              <div
                id="securityQuestionDisplay"
                style="
                  padding: 14px 16px;
                  border: 1px solid var(--border-color);
                  border-radius: 8px;
                  background: var(--input-bg);
                  color: var(--text-primary);
                  margin-bottom: 16px;
                  font-weight: 500;
                  transition:
                    background-color 0.3s ease,
                    border-color 0.3s ease;
                "
              >
                -
              </div>
            </div>

            <!-- SECURITY ANSWER -->
            <div class="form-group">
              <label for="forgotAnswer">Security Answer</label>
              <input
                type="text"
                placeholder="Enter your security answer"
                id="forgotAnswer"
                name="securityAnswer"
                required
                autocomplete="off"
                aria-required="true"
                aria-label="Security Answer"
                style="
                  width: 100%;
                  padding: 14px 16px;
                  border: 1px solid var(--border-color);
                  border-radius: 8px;
                  font-size: 15px;
                  background: var(--input-bg);
                  color: var(--text-primary);
                "
              />
            </div>

            <!-- NEW PASSWORD -->
            <div class="form-group">
              <label for="forgotNewPass">New Password</label>
              <div
                class="password-wrapper"
                style="position: relative; display: flex; align-items: center"
              >
                <input
                  type="password"
                  placeholder="Enter your new password"
                  id="forgotNewPass"
                  name="newPassword"
                  autocomplete="new-password"
                  required
                  aria-required="true"
                  aria-label="New Password"
                  style="width: 100%; padding-right: 40px"
                />
                <button
                  type="button"
                  id="toggleNewPass"
                  class="ri-eye-line toggle-eye"
                  aria-label="Toggle new password visibility"
                  style="
                    position: absolute;
                    right: 10px;
                    background: none;
                    border: none;
                    cursor: pointer;
                    color: #666;
                    font-size: 18px;
                  "
                ></button>
              </div>
            </div>

            <!-- CONFIRM PASSWORD -->
            <div class="form-group">
              <label for="forgotConfirmPass">Confirm Password</label>
              <div
                class="password-wrapper"
                style="position: relative; display: flex; align-items: center"
              >
                <input
                  type="password"
                  placeholder="Confirm your new password"
                  id="forgotConfirmPass"
                  name="confirmPassword"
                  autocomplete="new-password"
                  required
                  aria-required="true"
                  aria-label="Confirm Password"
                  style="width: 100%; padding-right: 40px"
                />
                <button
                  type="button"
                  id="toggleConfirmPass"
                  class="ri-eye-line toggle-eye"
                  aria-label="Toggle confirm password visibility"
                  style="
                    position: absolute;
                    right: 10px;
                    background: none;
                    border: none;
                    cursor: pointer;
                    color: #666;
                    font-size: 18px;
                  "
                ></button>
              </div>
            </div>

            <!-- BUTTON -->
            <button type="submit" class="btn-primary" style="margin-top: 10px">
              RESET PASSWORD
            </button>
          </div>
        </form>

        <!-- BACK TO LOGIN -->
        <div class="switch-auth">
          Remember your password?
          <a href="login.html">Login</a>
        </div>
      </div>
    </section>
  </body>

  <script src="app.js"></script>
  <script src="forgotPassword.js"></script>
</html>
