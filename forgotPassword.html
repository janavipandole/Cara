<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Forgot Password | Cara</title>

    <link rel="icon" href="images/favicon.jpg">

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="toast.css">
    <link rel="stylesheet" href="forgotPassword.css">

</head>

<body>

    <!-- HEADER -->
    <section id="header">
        <a href="index.html">
            <img src="images/logo.png" alt="Cara Logo">
        </a>

        <ul id="navbar">
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="login.html" id="login-btn">Login</a></li>
        </ul>
    </section>

    <!-- FORGOT SECTION -->
    <section id="forgot-section">

        <div class="auth-card">

            <h2>Forgot Password</h2>

            <p class="subtitle">
                Enter your email to reset your password 🔒
            </p>

            <form id="forgotForm" novalidate>
                <!-- EMAIL -->
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="forgotEmail" placeholder="Enter your registered email" required>
                </div>

                <!-- NEW PASSWORD -->
                <div class="form-group">
                    <label>New Password</label>
                    <div class="password-wrapper">
                        <input type="password" placeholder="Enter your new password" id="forgotNewPass" required>
                        <i class="ri-eye-line toggle-eye" id="toggleNewPass"></i>
                    </div>
                </div>

                <!-- CONFIRM PASSWORD -->
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" placeholder="Confirm your new password" id="forgotConfirmPass" required>
                        <i class="ri-eye-line toggle-eye" id="toggleConfirmPass"></i>
                    </div>
                </div>

                <!-- BUTTON -->
                <button type="submit" class="btn-primary">
                    RESET PASSWORD
                </button>
            </form>

            <!-- BACK TO LOGIN -->
            <div class="switch-auth">
                Remember your password?
                <a href="login.html">Login</a>
            </div>

        </div>

    </section>

<!-- Custom Cursor Effect with Multi-Trail -->
<style>
    * {
        cursor: none !important;
    }
    
    /* Main cursor circle */
    .custom-cursor {
        width: 28px;
        height: 28px;
        background: radial-gradient(circle, #006d6d, #008b74, #00a88a);
        border-radius: 50%;
        position: fixed;
        pointer-events: none;
        z-index: 999999;
        transform: translate(-50%, -50%);
        transition: width 0.15s cubic-bezier(0.2, 0.9, 0.4, 1.1), height 0.15s cubic-bezier(0.2, 0.9, 0.4, 1.1), background 0.2s;
        box-shadow: 0 0 30px rgba(0, 141, 116, 0.9), 0 0 60px rgba(0, 109, 109, 0.5);
        mix-blend-mode: screen;
    }
    
    /* Trail dots following the cursor */
    .cursor-trail {
        width: 14px;
        height: 14px;
        background: radial-gradient(circle, #00a88a, #006d6d);
        border-radius: 50%;
        position: fixed;
        pointer-events: none;
        z-index: 999998;
        transform: translate(-50%, -50%);
        filter: blur(3px);
        opacity: 0.7;
        transition: 0.03s linear;
    }
    
    /* Sparkle particles */
    .cursor-sparkle {
        position: fixed;
        pointer-events: none;
        z-index: 999999;
        width: 4px;
        height: 4px;
        background: #fff;
        border-radius: 50%;
        opacity: 0;
        transform: translate(-50%, -50%);
    }
    
    /* Hover effect for interactive elements */
    a:hover ~ .custom-cursor,
    button:hover ~ .custom-cursor,
    .product:hover ~ .custom-cursor,
    .add-to-cart:hover ~ .custom-cursor {
        width: 44px !important;
        height: 44px !important;
        background: radial-gradient(circle, #005f73, #008b74, #00a88a) !important;
        box-shadow: 0 0 45px rgba(0, 95, 115, 1), 0 0 90px rgba(0, 141, 116, 0.8) !important;
        filter: brightness(1.3);
        mix-blend-mode: screen !important;
    }
    
    /* Ripple ring effect on click */
    .click-ring {
        position: fixed;
        pointer-events: none;
        z-index: 999999;
        border-radius: 50%;
        transform: translate(-50%, -50%) scale(0);
        opacity: 0.6;
        transition: transform 0.15s ease-out, opacity 0.15s ease-out;
    }
</style>

<script>
    (function() {
        /* Create main cursor element */
        const cursor = document.createElement('div');
        cursor.className = 'custom-cursor';
        document.body.appendChild(cursor);
        
        /* Create trail elements */
        const trails = [];
        const trailCount = 18;
        
        for (let i = 0; i < trailCount; i++) {
            const trail = document.createElement('div');
            trail.className = 'cursor-trail';
            const size = 16 - (i * 0.8);
            trail.style.width = Math.max(3, size) + 'px';
            trail.style.height = Math.max(3, size) + 'px';
            trail.style.opacity = 0.9 - (i * 0.045);
            trail.style.filter = `blur(${Math.min(4, i * 0.25)}px)`;
            const colors = ['#006d6d', '#008b74', '#00a88a', '#005f6b'];
            trail.style.background = `radial-gradient(circle, ${colors[i % 4]}, ${colors[(i+2) % 4]})`;
            document.body.appendChild(trail);
            trails.push(trail);
        }
        
        /* Create sparkle particle with animation */
        function createSparkle(x, y, size = null, color = null) {
            const sparkle = document.createElement('div');
            sparkle.className = 'cursor-sparkle';
            sparkle.style.left = x + 'px';
            sparkle.style.top = y + 'px';
            const sparkSize = size || Math.random() * 8 + 2;
            sparkle.style.width = sparkSize + 'px';
            sparkle.style.height = sparkSize + 'px';
            const colors = ['#006d6d', '#008b74', '#00a88a', '#005f6b', '#ffffff'];
            sparkle.style.background = color || `radial-gradient(circle, ${colors[Math.floor(Math.random() * colors.length)]}, #006d6d)`;
            sparkle.style.boxShadow = '0 0 10px rgba(0, 141, 116, 0.8)';
            document.body.appendChild(sparkle);
            
            let opacity = 1;
            let currentSize = sparkSize;
            let dx = (Math.random() - 0.5) * 6;
            let dy = (Math.random() - 0.5) * 6;
            let xPos = x;
            let yPos = y;
            
            const interval = setInterval(() => {
                opacity -= 0.07;
                currentSize -= 0.25;
                xPos += dx;
                yPos += dy;
                sparkle.style.opacity = opacity;
                sparkle.style.width = Math.max(0, currentSize) + 'px';
                sparkle.style.height = sparkle.style.width;
                sparkle.style.left = xPos + 'px';
                sparkle.style.top = yPos + 'px';
                
                if (opacity <= 0) {
                    clearInterval(interval);
                    sparkle.remove();
                }
            }, 20);
        }
        
        let mouseX = 0, mouseY = 0;
        let velocity = 0;
        let lastX = 0, lastY = 0;
        let prevPositions = Array(trailCount).fill().map(() => ({ x: 0, y: 0 }));
        
        /* Track mouse movement and generate velocity-based sparkles */
        document.addEventListener('mousemove', (e) => {
            const dx = e.clientX - lastX;
            const dy = e.clientY - lastY;
            velocity = Math.sqrt(dx * dx + dy * dy);
            
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            cursor.style.left = mouseX + 'px';
            cursor.style.top = mouseY + 'px';
            
            /* Fast movement sparkles */
            if (velocity > 20 && Math.random() > 0.5) {
                const sparkleCount = Math.min(Math.floor(velocity / 15), 5);
                for (let i = 0; i < sparkleCount; i++) {
                    setTimeout(() => {
                        createSparkle(mouseX + (Math.random() - 0.5) * velocity * 0.5, mouseY + (Math.random() - 0.5) * velocity * 0.5, Math.random() * 6 + 2);
                    }, i * 30);
                }
            }
            
            /* Directional sparkles on very fast movement */
            if (velocity > 40 && Math.random() > 0.7) {
                const angle = Math.atan2(dy, dx);
                for (let i = 0; i < 3; i++) {
                    const offsetX = Math.cos(angle + (i - 1) * 0.5) * 15;
                    const offsetY = Math.sin(angle + (i - 1) * 0.5) * 15;
                    createSparkle(mouseX + offsetX, mouseY + offsetY, Math.random() * 5 + 2, '#00a88a');
                }
            }
            
            lastX = mouseX;
            lastY = mouseY;
        });
        
        /* Animate trail positions with easing */
        function animateTrail() {
            for (let i = 0; i < trailCount; i++) {
                const easing = 0.35 - (i * 0.015);
                const targetX = i === 0 ? mouseX : prevPositions[i-1].x;
                const targetY = i === 0 ? mouseY : prevPositions[i-1].y;
                
                prevPositions[i].x += (targetX - prevPositions[i].x) * Math.max(0.08, easing);
                prevPositions[i].y += (targetY - prevPositions[i].y) * Math.max(0.08, easing);
                
                const angleOffset = i * 0.2;
                const radius = Math.sin(Date.now() * 0.005 + i) * (velocity / 30);
                const offsetX = Math.cos(angleOffset) * radius;
                const offsetY = Math.sin(angleOffset) * radius;
                
                trails[i].style.left = (prevPositions[i].x + offsetX) + 'px';
                trails[i].style.top = (prevPositions[i].y + offsetY) + 'px';
                
                if (velocity > 30) {
                    trails[i].style.transform = `translate(-50%, -50%) scale(${1 + velocity / 100})`;
                } else {
                    trails[i].style.transform = 'translate(-50%, -50%) scale(1)';
                }
            }
            
            requestAnimationFrame(animateTrail);
        }
        
        for (let i = 0; i < trailCount; i++) {
            prevPositions[i] = { x: mouseX, y: mouseY };
        }
        
        animateTrail();
        
        /* Hide cursor when leaving window */
        document.addEventListener('mouseleave', () => {
            cursor.style.opacity = '0';
            trails.forEach(trail => trail.style.opacity = '0');
        });
        
        /* Show cursor when entering window */
        document.addEventListener('mouseenter', () => {
            cursor.style.opacity = '1';
            trails.forEach(trail => trail.style.opacity = '0.7');
        });
        
        /* Click effect with rings and sparkles */
        document.addEventListener('mousedown', (e) => {
            cursor.style.transform = 'translate(-50%, -50%) scale(0.85)';
            
            /* Create two ripple rings */
            for (let r = 0; r < 2; r++) {
                const ring = document.createElement('div');
                ring.className = 'click-ring';
                ring.style.left = e.clientX + 'px';
                ring.style.top = e.clientY + 'px';
                ring.style.width = (15 + r * 8) + 'px';
                ring.style.height = (15 + r * 8) + 'px';
                ring.style.border = `2px solid ${r === 0 ? '#00a88a' : '#55efc4'}`;
                ring.style.opacity = 0.7 - r * 0.2;
                document.body.appendChild(ring);
                
                setTimeout(() => {
                    ring.style.transform = 'translate(-50%, -50%) scale(2.5)';
                    ring.style.opacity = '0';
                }, 10);
                
                setTimeout(() => {
                    ring.remove();
                }, 150);
            }
            
            /* Directional sparkle burst */
            for (let i = 0; i < 16; i++) {
                setTimeout(() => {
                    const angle = (i * 22.5) * Math.PI / 180;
                    const radius = 15;
                    const offsetX = Math.cos(angle) * radius;
                    const offsetY = Math.sin(angle) * radius;
                    createSparkle(e.clientX + offsetX, e.clientY + offsetY, Math.random() * 6 + 2);
                }, i * 6);
            }
            
            /* Random scattered sparkles */
            for (let i = 0; i < 12; i++) {
                setTimeout(() => {
                    const angle = Math.random() * Math.PI * 2;
                    const radius = 10 + Math.random() * 20;
                    const offsetX = Math.cos(angle) * radius;
                    const offsetY = Math.sin(angle) * radius;
                    const colors = ['#006d6d', '#008b74', '#00a88a', '#55efc4'];
                    createSparkle(e.clientX + offsetX, e.clientY + offsetY, Math.random() * 5 + 2, colors[Math.floor(Math.random() * colors.length)]);
                }, i * 8);
            }
        });
        
        /* Reset cursor scale on mouse up */
        document.addEventListener('mouseup', () => {
            cursor.style.transform = 'translate(-50%, -50%) scale(1)';
        });
        
        /* Hover effects for all interactive elements */
        const interactiveElements = document.querySelectorAll('a, button, .product, .add-to-cart, .cta-button, .cart-item, input[type="submit"], .shop-item, .blog-card, .nav-link');
        interactiveElements.forEach(el => {
            el.addEventListener('mouseenter', () => {
                cursor.style.width = '44px';
                cursor.style.height = '44px';
                cursor.style.background = 'radial-gradient(circle, #005f73, #008b74, #00a88a)';
                cursor.style.filter = 'brightness(1.3)';
                
                /* Sparkles on hover */
                for (let i = 0; i < 8; i++) {
                    setTimeout(() => {
                        const rect = el.getBoundingClientRect();
                        const x = rect.left + Math.random() * rect.width;
                        const y = rect.top + Math.random() * rect.height;
                        createSparkle(x, y, Math.random() * 5 + 2, '#00a88a');
                    }, i * 25);
                }
            });
            
            el.addEventListener('mouseleave', () => {
                cursor.style.width = '28px';
                cursor.style.height = '28px';
                cursor.style.background = 'radial-gradient(circle, #006d6d, #008b74, #00a88a)';
                cursor.style.filter = 'none';
            });
        });
        
        /* Ambient sparkles when mouse is idle */
        setInterval(() => {
            if (velocity < 15 && Math.random() > 0.94) {
                const x = mouseX + (Math.random() - 0.5) * 80;
                const y = mouseY + (Math.random() - 0.5) * 80;
                createSparkle(x, y, Math.random() * 4 + 1, '#008b74');
            }
        }, 300);
        
        /* Hide default cursor */
        document.body.style.cursor = 'none';
    })();
</script>

    <script src="app.js"></script>
    <script src="forgotPassword.js"></script>
</html>
