<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Cara — Modern E‑Commerce</title>
    <link rel="icon" type="image/jpg" sizes="32x32" href="images/favicon.jpg" />
    <meta
      name="description"
      content="Cara E-Commerce — modern, responsive, and user-friendly shopping experience"
    />
    <style>
      /*--------------------
       Cara E-Commerce Styles
       Modern, minimal, responsive
      -------------------- */
      :root {
        --bg: #0f1724;
        /* dark page background */
        --card: #0b1220;
        --muted: #94a3b8;
        --accent: #7c3aed;
        --accent-2: #06b6d4;
        --glass: rgba(255, 255, 255, 0.04);
        --glass-2: rgba(255, 255, 255, 0.02);
        --radius: 14px;
        --shadow: 0 8px 30px rgba(2, 6, 23, 0.7);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          'Helvetica Neue',
          Arial;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        background: linear-gradient(180deg, #071020 0%, var(--bg) 100%);
        color: #e6eef8;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        padding: 24px;
        line-height: 1.3;
      }

      /* Layout */
      .app {
        max-width: 1200px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1fr 360px;
        gap: 24px;
        align-items: start;
      }

      /* Header */
      header {
        display: flex;
        gap: 16px;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 18px;
      }

      .brand {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .logo {
        width: 48px;
        height: 48px;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 18px;
        color: white;
        box-shadow: 0 6px 20px rgba(124, 58, 237, 0.25);
      }

      .brand h1 {
        font-size: 18px;
        margin: 0;
      }

      .tag {
        font-size: 12px;
        color: var(--muted);
      }

      /* Controls */
      .controls {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .search {
        background: var(--glass);
        padding: 8px 12px;
        border-radius: 12px;
        display: flex;
        gap: 8px;
        align-items: center;
        min-width: 260px;
      }

      .search input {
        background: transparent;
        border: 0;
        color: inherit;
        outline: none;
        width: 100%;
      }

      .icon-btn {
        background: var(--glass);
        padding: 8px;
        border-radius: 10px;
        border: 0;
        cursor: pointer;
      }

      /* Main content */
      .catalog {
        background: transparent;
        padding: 18px;
        border-radius: 16px;
        min-height: 60vh;
      }

      .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .filters {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .filter-btn {
        background: var(--glass-2);
        border-radius: 10px;
        padding: 6px 10px;
        font-size: 13px;
        color: var(--muted);
        cursor: pointer;
      }

      /* Product grid */
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 16px;
      }

      .card {
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.02),
          rgba(255, 255, 255, 0.01)
        );
        border-radius: 12px;
        padding: 12px;
        box-shadow: var(--shadow);
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.02);
      }

      .thumb {
        height: 170px;
        border-radius: 10px;
        background: linear-gradient(180deg, #0b1220, #071022);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 10px;
      }

      .thumb img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }

      .meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .title {
        font-weight: 600;
      }

      .price {
        font-weight: 700;
        color: var(--accent-2);
      }

      .desc {
        font-size: 13px;
        color: var(--muted);
        margin-top: 6px;
      }

      .card-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 12px;
      }

      .add {
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        padding: 8px 12px;
        border-radius: 10px;
        border: 0;
        color: white;
        cursor: pointer;
      }

      /* Sidebar / cart */
      .sidebar {
        position: sticky;
        top: 24px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.02),
          rgba(255, 255, 255, 0.01)
        );
        border-radius: 16px;
        padding: 16px;
        height: fit-content;
        border: 1px solid rgba(255, 255, 255, 0.02);
      }

      .cart-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 10px;
      }

      .cart-item {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .cart-thumb {
        width: 58px;
        height: 58px;
        border-radius: 8px;
        background: var(--glass);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .qty {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .qty button {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.04);
        padding: 6px;
        border-radius: 6px;
        color: var(--muted);
        cursor: pointer;
      }

      .checkout {
        margin-top: 12px;
        padding: 10px;
        border-radius: 12px;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        border: 0;
        color: white;
        width: 100%;
        font-weight: 700;
        cursor: pointer;
      }

      /* Modal / quick view */
      .modal {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(2, 6, 23, 0.6);
        padding: 20px;
        z-index: 60;
      }

      .modal-card {
        background: linear-gradient(180deg, #061019, #08111b);
        padding: 18px;
        border-radius: 12px;
        max-width: 880px;
        width: 100%;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .close {
        position: absolute;
        right: 18px;
        top: 18px;
        background: transparent;
        border: 0;
        color: var(--muted);
        cursor: pointer;
      }

      /* Empty states */
      .empty {
        padding: 28px;
        border-radius: 12px;
        text-align: center;
        color: var(--muted);
        background: var(--glass-2);
      }

      #clearFilters {
        background: var(--glass-2);
        border-radius: 10px;
        padding: 6px 12px;
        font-size: 13px;
        color: var(--muted);
        cursor: pointer;
        border: none;
        /* Optional: remove default border */
        transition:
          background 0.3s,
          transform 0.2s;
        /* Optional: for hover effects */
      }

      #clearFilters:hover {
        background: var(--glass);
        transform: translateY(-2px);
      }

      /* Small screens */
      @media (max-width: 980px) {
        .app {
          grid-template-columns: 1fr;
        }

        .sidebar {
          order: 2;
        }

        header {
          flex-direction: column;
          align-items: flex-start;
          gap: 12px;
        }

        .search {
          min-width: 100%;
        }

        .modal-card {
          grid-template-columns: 1fr;
        }
      }

      /* Tiny polish */
      a,
      button {
        font-family: inherit;
      }

      .muted {
        color: var(--muted);
        font-size: 13px;
      }

      /* animations */
      .fade-up {
        transform: translateY(8px);
        opacity: 0;
        animation: flyup 0.45s forwards;
      }

      @keyframes flyup {
        to {
          transform: none;
          opacity: 1;
        }
      }

      /* Toast Notifications styling inside cara.html */
      #toast-container {
        position: fixed;
        top: 24px;
        right: 24px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        z-index: 10000;
        pointer-events: none;
      }
      .toast {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 300px;
        max-width: 420px;
        padding: 14px 18px;
        border-radius: 12px;
        background: #0b1220;
        color: #e6eef8;
        font-size: 14px;
        font-weight: 500;
        box-shadow:
          0 8px 30px rgba(0, 0, 0, 0.4),
          0 2px 8px rgba(0, 0, 0, 0.2);
        border-left: 4px solid var(--accent);
        border: 1px solid rgba(255, 255, 255, 0.05);
        pointer-events: all;
        position: relative;
        overflow: hidden;
        animation: toastSlideIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }
      .toast-hiding {
        animation: toastSlideOut 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }
      .toast-msg {
        flex: 1;
        line-height: 1.4;
      }
      .toast-close {
        background: none;
        border: none;
        font-size: 18px;
        color: var(--muted);
        cursor: pointer;
        padding: 0;
        line-height: 1;
        transition:
          color 0.2s,
          transform 0.2s;
      }
      .toast-close:hover {
        color: #ffffff;
        transform: scale(1.1);
      }
      .toast-progress {
        position: absolute;
        bottom: 0;
        left: 0;
        height: 3px;
        background: var(--accent);
        animation: toastProgress 4s linear forwards;
      }
      .toast-success {
        border-left-color: var(--accent-2);
      }
      .toast-success .toast-progress {
        background: var(--accent-2);
      }
      .toast-error {
        border-left-color: #dc2626;
      }
      .toast-error .toast-progress {
        background: #dc2626;
      }
      @keyframes toastSlideIn {
        from {
          opacity: 0;
          transform: translateX(100%);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      @keyframes toastSlideOut {
        from {
          opacity: 1;
          transform: translateX(0);
        }
        to {
          opacity: 0;
          transform: translateX(100%);
        }
      }
      @keyframes toastProgress {
        from {
          width: 100%;
        }
        to {
          width: 0%;
        }
      }
      /* Scroll To Top Button */

      #scrollTopBtn {
        position: fixed;
        bottom: 30px;
        right: 30px; /* keeps button on right side */

        width: 55px;
        height: 55px;

        border: none;
        border-radius: 50%;

        background-color: #088178;
        color: white;

        font-size: 24px;
        font-weight: bold;

        cursor: pointer;
        z-index: 999;

        display: none;

        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        transition: all 0.3s ease;
      }

      #scrollTopBtn:hover {
        background-color: #065f5b;
        transform: scale(1.1);
      }
    </style>
    <link rel="stylesheet" href="cursor.css" />
    `n
  </head>

  <body>
    <header>
      <div class="brand">
        <div class="logo">C</div>
        <div>
          <h1>Cara</h1>
          <div class="tag">Curated modern goods • Fast & friendly</div>
        </div>
      </div>

      <div class="controls">
        <div class="search" role="search">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            aria-hidden
          >
            <path
              d="M21 21l-4.35-4.35"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <input
            id="search"
            placeholder="Search products, e.g. 'sneakers'"
            aria-label="Search products"
          />
        </div>

        <button class="icon-btn" id="sortBtn" title="Sort">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path
              d="M3 6h18M6 12h12M10 18h4"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
        <button class="icon-btn" id="cartBtn" aria-label="Open cart">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path
              d="M6 6h15l-1.5 9h-12zM6 6L4 2H2"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
      </div>
    </header>

    <main class="app" role="main">
      <section class="catalog">
        <div class="toolbar">
          <div>
            <div class="muted">Showing <span id="count">0</span> products</div>
            <h2 style="margin: 6px 0 0">
              Featured
              <small
                class="muted"
                style="margin-left: 8px; font-weight: 500; font-size: 13px"
                >Hand-picked, best sellers</small
              >
            </h2>
          </div>
          <div class="filters">
            <select id="category" class="filter-btn">
              <option value="all">All categories</option>
            </select>
            <select id="priceRange" class="filter-btn">
              <option value="any">Any price</option>
              <option value="0-25">Under $25</option>
              <option value="25-75">$25–75</option>
              <option value="75-9999">$75+</option>
            </select>
            <button
              id="clearFilters"
              class="filter-btn"
              title="Clear all filters"
            >
              Clear All Filters
            </button>
          </div>
        </div>

        <div id="grid" class="grid" aria-live="polite"></div>

        <div id="empty" class="empty" style="display: none; margin-top: 14px">
          No products match your search. Try different keywords or clear
          filters.
        </div>
      </section>

      <aside class="sidebar" aria-label="Cart and summary">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
          "
        >
          <div>
            <h3 style="margin: 0">Your Cart</h3>
            <div class="muted">Keep items for later or checkout quickly</div>
          </div>
          <button id="clearCart" class="icon-btn" title="Clear cart">
            Clear
          </button>
        </div>

        <div id="cartList" class="cart-list">
          <div class="muted">Cart is empty</div>
        </div>

        <div style="margin-top: 12px">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
            "
          >
            <div class="muted">Subtotal</div>
            <div id="subtotal" style="font-weight: 800">$0.00</div>
          </div>
          <button id="checkout" class="checkout">Proceed to Checkout</button>
        </div>
      </aside>
    </main>
    <button id="scrollTopBtn" title="Go to top">↑</button>

    <!-- Quick view modal (hidden by default) -->
    <div id="modalRoot" style="display: none"></div>

    <script>
      /* Cara — lightweight product catalogue + cart
       - Mobile-first
       - Single-file for quick prototyping
       - Uses localStorage for cart persistence
    */

      const sampleProducts = [
        {
          id: 'c1',
          title: 'Aero Runner Sneakers',
          price: 69.0,
          cat: 'footwear',
          img: '',
          desc: 'Lightweight breathable trainers for everyday comfort.',
        },
        {
          id: 'c2',
          title: 'Nimbus Hoodie',
          price: 49.0,
          cat: 'apparel',
          img: '',
          desc: 'Cozy oversized hoodie with soft fleece inside.',
        },
        {
          id: 'c3',
          title: 'Orbit Stainless Bottle',
          price: 24.5,
          cat: 'home',
          img: '',
          desc: 'Vacuum insulated bottle keeps drinks cold for 24h.',
        },
        {
          id: 'c4',
          title: 'Willow Leather Wallet',
          price: 39.99,
          cat: 'accessories',
          img: '',
          desc: 'Slim leather wallet with RFID protection.',
        },
        {
          id: 'c5',
          title: 'Pixel Case — Phone',
          price: 19.99,
          cat: 'accessories',
          img: '',
          desc: 'Slim, shock-absorbent case with matte finish.',
        },
        {
          id: 'c6',
          title: 'Lumen Desk Lamp',
          price: 89.0,
          cat: 'home',
          img: '',
          desc: 'Minimal lamp with adjustable brightness and color temp.',
        },
        {
          id: 'c7',
          title: 'Trailpack 30L',
          price: 129.0,
          cat: 'bags',
          img: '',
          desc: 'Durable daypack with weather-resistant fabric.',
        },
        {
          id: 'c8',
          title: 'Canvas Sneaker — White',
          price: 29.99,
          cat: 'footwear',
          img: '',
          desc: 'Casual canvas sneakers made for daily wear.',
        },
      ];

      // generate simple gradient placeholder images as data URLs
      function placeholderSVG(title) {
        const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='600' height='400'><defs><linearGradient id='g' x1='0' x2='1' y1='0' y2='1'><stop offset='0' stop-color='%237c3aed'/><stop offset='1' stop-color='%2306b6d4'/></linearGradient></defs><rect width='100%' height='100%' fill='url(%23g)' rx='16' /><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-family='Inter, Arial' font-weight='700' font-size='28' fill='white'>${title}</text></svg>`;
        return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
      }

      // populate images
      sampleProducts.forEach((p) => (p.img = placeholderSVG(p.title)));

      // state
      let products = [...sampleProducts];
      let cart = JSON.parse(localStorage.getItem('cara_cart') || '{}');

      // DOM refs
      const grid = document.getElementById('grid');
      const count = document.getElementById('count');
      const cartList = document.getElementById('cartList');
      const subtotalEl = document.getElementById('subtotal');
      const searchInput = document.getElementById('search');
      const categorySelect = document.getElementById('category');
      const priceRange = document.getElementById('priceRange');
      const modalRoot = document.getElementById('modalRoot');

      // init categories
      const categories = Array.from(new Set(products.map((p) => p.cat)));
      categories.forEach((cat) => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat[0].toUpperCase() + cat.slice(1);
        categorySelect.appendChild(opt);
      });
      document.getElementById('clearFilters').addEventListener('click', () => {
        categorySelect.value = 'all';
        priceRange.value = 'any';
        searchInput.value = '';
        filterProducts();
      });

      // helpers
      function formatPrice(v) {
        return '$' + v.toFixed(2);
      }
      function saveCart() {
        localStorage.setItem('cara_cart', JSON.stringify(cart));
      }

      function renderGrid(items) {
        grid.innerHTML = '';
        if (!items.length) {
          document.getElementById('empty').style.display = 'block';
        } else document.getElementById('empty').style.display = 'none';

        count.textContent = items.length;
        items.forEach((p) => {
          const card = document.createElement('article');
          card.className = 'card fade-up';
          card.innerHTML = `
          <div class="thumb" aria-hidden><img src="${p.img}" alt="${p.title}"></div>
          <div class="meta"><div class="title">${p.title}</div><div class="price">${formatPrice(p.price)}</div></div>
          <div class="desc">${p.desc}</div>
          <div class="card-footer">
            <button class="add" data-id="${p.id}">Add to cart</button>
            <button class="icon-btn" data-qv="${p.id}" title="Quick view">View</button>
          </div>
        `;
          grid.appendChild(card);
        });

        // attach add handlers
        grid
          .querySelectorAll('.add')
          .forEach((btn) =>
            btn.addEventListener('click', (e) => addToCart(e.target.dataset.id))
          );
        grid
          .querySelectorAll('[data-qv]')
          .forEach((b) =>
            b.addEventListener('click', (e) => quickView(e.target.dataset.qv))
          );
      }

      function filterProducts() {
        const q = searchInput.value.trim().toLowerCase();
        const cat = categorySelect.value;
        const pr = priceRange.value;

        let out = products.filter((p) => {
          const matchesQ =
            !q ||
            p.title.toLowerCase().includes(q) ||
            p.desc.toLowerCase().includes(q);
          const matchesCat = cat === 'all' || p.cat === cat;
          let matchesPr = true;
          if (pr !== 'any') {
            const [min, max] = pr.split('-').map(Number);
            matchesPr = p.price >= (min || 0) && p.price <= (max || 99999);
          }
          return matchesQ && matchesCat && matchesPr;
        });
        renderGrid(out);
      }

      function addToCart(id, qty = 1) {
        const p = products.find((x) => x.id === id);
        if (!p) return;
        cart[id] = (cart[id] || 0) + qty;
        saveCart();
        renderCart();
        // microfeedback
        const btn = document.querySelector(`button.add[data-id='${id}']`);
        if (btn) {
          btn.textContent = 'Added ✓';
          setTimeout(() => (btn.textContent = 'Add to cart'), 900);
        }
      }

      function removeFromCart(id) {
        delete cart[id];
        saveCart();
        renderCart();
      }

      function changeQty(id, delta) {
        if (!cart[id]) return;
        cart[id] = Math.max(0, cart[id] + delta);
        if (cart[id] === 0) delete cart[id];
        saveCart();
        renderCart();
      }

      function renderCart() {
        cartList.innerHTML = '';
        const ids = Object.keys(cart);
        if (!ids.length) {
          cartList.innerHTML = '<div class="muted">Cart is empty</div>';
          subtotalEl.textContent = '$0.00';
          return;
        }
        let total = 0;
        ids.forEach((id) => {
          const p = products.find((x) => x.id === id);
          const q = cart[id];
          const line = p.price * q;
          total += line;
          const el = document.createElement('div');
          el.className = 'cart-item';
          el.innerHTML = `
          <div class='cart-thumb'><img src='${p.img}' alt='${p.title}' style='width:100%;height:100%;object-fit:cover;border-radius:6px'/></div>
          <div style='flex:1'>
            <div style='display:flex;justify-content:space-between;align-items:center'>
              <div style='font-weight:700'>${p.title}</div>
              <div style='font-weight:700'>${formatPrice(line)}</div>
            </div>

 <!-- Custom Cursor Effect with Multi-Trail -->
<style>
    * {
        cursor: none !important;
    }
    
    /* Main cursor circle */
    .custom-cursor {
        width: 28px;
        height: 28px;
        background: radial-gradient(circle, #006d6d, #008b74, #00a88a);
        border-radius: 50%;
        position: fixed;
        pointer-events: none;
        z-index: 999999;
        transform: translate(-50%, -50%);
        transition: width 0.15s cubic-bezier(0.2, 0.9, 0.4, 1.1), height 0.15s cubic-bezier(0.2, 0.9, 0.4, 1.1), background 0.2s;
        box-shadow: 0 0 30px rgba(0, 141, 116, 0.9), 0 0 60px rgba(0, 109, 109, 0.5);
        mix-blend-mode: screen;
    }
    
    /* Trail dots following the cursor */
    .cursor-trail {
        width: 14px;
        height: 14px;
        background: radial-gradient(circle, #00a88a, #006d6d);
        border-radius: 50%;
        position: fixed;
        pointer-events: none;
        z-index: 999998;
        transform: translate(-50%, -50%);
        filter: blur(3px);
        opacity: 0.7;
        transition: 0.03s linear;
    }
    
    /* Sparkle particles */
    .cursor-sparkle {
        position: fixed;
        pointer-events: none;
        z-index: 999999;
        width: 4px;
        height: 4px;
        background: #fff;
        border-radius: 50%;
        opacity: 0;
        transform: translate(-50%, -50%);
    }
    
    /* Hover effect for interactive elements */
    a:hover ~ .custom-cursor,
    button:hover ~ .custom-cursor,
    .product:hover ~ .custom-cursor,
    .add-to-cart:hover ~ .custom-cursor {
        width: 44px !important;
        height: 44px !important;
        background: radial-gradient(circle, #005f73, #008b74, #00a88a) !important;
        box-shadow: 0 0 45px rgba(0, 95, 115, 1), 0 0 90px rgba(0, 141, 116, 0.8) !important;
        filter: brightness(1.3);
        mix-blend-mode: screen !important;
    }
    
    /* Ripple ring effect on click */
    .click-ring {
        position: fixed;
        pointer-events: none;
        z-index: 999999;
        border-radius: 50%;
        transform: translate(-50%, -50%) scale(0);
        opacity: 0.6;
        transition: transform 0.15s ease-out, opacity 0.15s ease-out;
    }
</style>

<script>
    (function() {
        /* Create main cursor element */
        const cursor = document.createElement('div');
        cursor.className = 'custom-cursor';
        document.body.appendChild(cursor);
        
        /* Create trail elements */
        const trails = [];
        const trailCount = 18;
        
        for (let i = 0; i < trailCount; i++) {
            const trail = document.createElement('div');
            trail.className = 'cursor-trail';
            const size = 16 - (i * 0.8);
            trail.style.width = Math.max(3, size) + 'px';
            trail.style.height = Math.max(3, size) + 'px';
            trail.style.opacity = 0.9 - (i * 0.045);
            trail.style.filter = `blur(${Math.min(4, i * 0.25)}px)`;
            const colors = ['#006d6d', '#008b74', '#00a88a', '#005f6b'];
            trail.style.background = `radial-gradient(circle, ${colors[i % 4]}, ${colors[(i+2) % 4]})`;
            document.body.appendChild(trail);
            trails.push(trail);
        }
        
        /* Create sparkle particle with animation */
        function createSparkle(x, y, size = null, color = null) {
            const sparkle = document.createElement('div');
            sparkle.className = 'cursor-sparkle';
            sparkle.style.left = x + 'px';
            sparkle.style.top = y + 'px';
            const sparkSize = size || Math.random() * 8 + 2;
            sparkle.style.width = sparkSize + 'px';
            sparkle.style.height = sparkSize + 'px';
            const colors = ['#006d6d', '#008b74', '#00a88a', '#005f6b', '#ffffff'];
            sparkle.style.background = color || `radial-gradient(circle, ${colors[Math.floor(Math.random() * colors.length)]}, #006d6d)`;
            sparkle.style.boxShadow = '0 0 10px rgba(0, 141, 116, 0.8)';
            document.body.appendChild(sparkle);
            
            let opacity = 1;
            let currentSize = sparkSize;
            let dx = (Math.random() - 0.5) * 6;
            let dy = (Math.random() - 0.5) * 6;
            let xPos = x;
            let yPos = y;
            
            const interval = setInterval(() => {
                opacity -= 0.07;
                currentSize -= 0.25;
                xPos += dx;
                yPos += dy;
                sparkle.style.opacity = opacity;
                sparkle.style.width = Math.max(0, currentSize) + 'px';
                sparkle.style.height = sparkle.style.width;
                sparkle.style.left = xPos + 'px';
                sparkle.style.top = yPos + 'px';
                
                if (opacity <= 0) {
                    clearInterval(interval);
                    sparkle.remove();
                }
            }, 20);
        }
        
        let mouseX = 0, mouseY = 0;
        let velocity = 0;
        let lastX = 0, lastY = 0;
        let prevPositions = Array(trailCount).fill().map(() => ({ x: 0, y: 0 }));
        
        /* Track mouse movement and generate velocity-based sparkles */
        document.addEventListener('mousemove', (e) => {
            const dx = e.clientX - lastX;
            const dy = e.clientY - lastY;
            velocity = Math.sqrt(dx * dx + dy * dy);
            
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            cursor.style.left = mouseX + 'px';
            cursor.style.top = mouseY + 'px';
            
            /* Fast movement sparkles */
            if (velocity > 20 && Math.random() > 0.5) {
                const sparkleCount = Math.min(Math.floor(velocity / 15), 5);
                for (let i = 0; i < sparkleCount; i++) {
                    setTimeout(() => {
                        createSparkle(mouseX + (Math.random() - 0.5) * velocity * 0.5, mouseY + (Math.random() - 0.5) * velocity * 0.5, Math.random() * 6 + 2);
                    }, i * 30);
                }
            }
            
            /* Directional sparkles on very fast movement */
            if (velocity > 40 && Math.random() > 0.7) {
                const angle = Math.atan2(dy, dx);

        /* Animate trail positions with easing */

                const easing = 0.35 - (i * 0.015);
                const targetX = i === 0 ? mouseX : prevPositions[i-1].x;
                const targetY = i === 0 ? mouseY : prevPositions[i-1].y;
                
                prevPositions[i].x += (targetX - prevPositions[i].x) * Math.max(0.08, easing);
                prevPositions[i].y += (targetY - prevPositions[i].y) * Math.max(0.08, easing);
                
                const angleOffset = i * 0.2;
                const radius = Math.sin(Date.now() * 0.005 + i) * (velocity / 30);
                const offsetX = Math.cos(angleOffset) * radius;
                const offsetY = Math.sin(angleOffset) * radius;
                
                trails[i].style.left = (prevPositions[i].x + offsetX) + 'px';
                trails[i].style.top = (prevPositions[i].y + offsetY) + 'px';
                
                if (velocity > 30) {

                } else {
                    trails[i].style.transform = 'translate(-50%, -50%) scale(1)';
                }
            }

        }
        
        for (let i = 0; i < trailCount; i++) {
            prevPositions[i] = { x: mouseX, y: mouseY };

        document.addEventListener('mouseleave', () => {

            trails.forEach(trail => trail.style.opacity = '0');
        });
        
        /* Show cursor when entering window */
        document.addEventListener('mouseenter', () => {
            cursor.style.opacity = '1';
            trails.forEach(trail => trail.style.opacity = '0.7');
        });

        document.addEventListener('mousedown', (e) => {

            /* Directional sparkle burst */

        /* Reset cursor scale on mouse up */

        });
        
        /* Hover effects for all interactive elements */
        const interactiveElements = document.querySelectorAll('a, button, .product, .add-to-cart, .cta-button, .cart-item, input[type="submit"], .shop-item, .blog-card, .nav-link');
        interactiveElements.forEach(el => {

        document.body.style.cursor = 'none';
    })();
