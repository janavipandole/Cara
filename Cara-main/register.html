<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Cara</title>

    <link rel="icon" type="image/jpg" sizes="32x32" href="images/favicon.jpg">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="toast.css">
    <link rel="stylesheet" href="register.css">

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
</head>

<body>

    <!-- HEADER -->
    <section id="header">

    <!-- Logo -->
    <a href="index.html">
        <img id="siteLogo" src="images/logo.png" alt="Cara Logo">
    </a>

    <div>
        <ul id="navbar">

            <!-- Main Nav Links -->
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="about.html">About</a></li>

            <!-- Contact Icon -->
            <li class="nav-icon">
                <a href="contact.html" aria-label="Contact">
                    <i class="ri-customer-service-2-line"></i>
                </a>
            </li>

            <!-- Login Icon -->
            <li class="nav-icon">
                <a href="login.html" class="active" aria-label="Login">
                    <i class="ri-user-3-line"></i>
                </a>
            </li>

            <!-- Cart Icon -->
            <li class="nav-icon">
                <a href="cart.html" id="lg-bag" aria-label="Cart">
                    <i class="ri-shopping-bag-4-line"></i>
                </a>
            </li>

            <!-- Theme Toggle -->
            <li class="nav-icon">
                <button
                    class="theme-toggle"
                    id="themeToggle"
                    aria-label="Toggle dark mode"
                >
                    <i class="ri-moon-line" id="themeIcon"></i>
                </button>
            </li>

        </ul>
    </div>

</section>

    <!-- REGISTER SECTION -->
    <section id="register-section">

        <div class="auth-card">

            <h2>Register</h2>

            <p class="subtitle">
                Create your account 😊
            </p>

            <form id="registerForm" novalidate>
                <!-- FULL NAME -->
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text"
                        id="registerUsername"
                        placeholder="Enter your full name" required>
                </div>

                <!-- EMAIL -->
                <div class="form-group">
                    <label>Email</label>
                    <input type="email"
                        id="registerEmail"
                        placeholder="Enter your email" required>
                </div>

                <!-- PASSWORD -->
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password"
                            placeholder="Enter your password"
                            id="registerPassword" required>
                        <i class="ri-eye-line toggle-eye"></i>
                    </div>
                </div>

                <!-- CONFIRM PASSWORD -->
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password"
                            placeholder="Confirm your password"
                            id="confirmPassword" required>
                        <i class="ri-eye-line toggle-eye"></i>
                    </div>
                </div>

                <!-- BUTTON -->
                <button type="submit" class="btn-primary">
                    CREATE ACCOUNT
                </button>
            </form>

            <!-- LOGIN LINK -->
            <div class="switch-auth">

                Already have an account?

                <a href="login.html">
                    Login
                </a>

            </div>

        </div>

    </section>

    <script>
    const toggleEyes = document.querySelectorAll(".toggle-eye");

    toggleEyes.forEach((eye) => {

        eye.addEventListener("click", () => {

            const passwordInput = eye.previousElementSibling;

            if (passwordInput.type === "password") {

                passwordInput.type = "text";

                eye.classList.remove("ri-eye-line");
                eye.classList.add("ri-eye-off-line");

            } else {

                passwordInput.type = "password";

                eye.classList.remove("ri-eye-off-line");
                eye.classList.add("ri-eye-line");
            }

        });

    });
</script>

    <script src="app.js?v=1779120917218"></script>
    <script src="register.js"></script>
</body>

</html>
