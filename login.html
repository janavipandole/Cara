<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cara</title>

    <link rel="icon" type="image/jpg" sizes="32x32" href="images/favicon.jpg" />
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />

    <link rel="stylesheet" href="toast.css">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<section id="header">
  <a href="index.html">
    <img id="siteLogo" src="images/logo.png" alt="Cara Logo" />
  </a>

  <div id="navbar-container"></div>

  <div class="mobile">
    <a href="login.html"><i class="ri-user-3-line"></i></a>
    <a href="cart.html"><i class="ri-shopping-bag-4-line"></i></a>
    <i class="fas fa-outdent" id="bar"></i>
  </div>
</section>

<div class="login-container">
    <a href="index.html" class="back-button">&#8592; Back to Shop</a>

    <div class="logo-container">
        <img src="images/logo.png" alt="Cara Logo" class="logo-img">
    </div>

    <h2>Welcome Back!</h2>
    <p class="subtitle">Please enter your details to sign in</p>

    <form id="loginForm" class="login-form" novalidate>

        <!-- EMAIL -->
        <div class="input-group">
            <label for="loginEmail">Email Address</label>
            <input type="email" id="loginEmail" class="input-field" required>
        </div>

        <!-- PASSWORD (UPDATED) -->
        <div class="input-group">
            <label for="loginPassword">Password</label>

            <div style="position: relative;">
                <input 
                    type="password" 
                    id="loginPassword" 
                    class="input-field" 
                    required 
                    style="padding-right: 45px;"
                >

                <button 
                    type="button" 
                    id="togglePassword"
                    style="
                        position:absolute;
                        right:10px;
                        top:50%;
                        transform:translateY(-50%);
                        background:none;
                        border:none;
                        cursor:pointer;
                        font-size:18px;
                        color:#666;
                    "
                >
                    <i class="ri-eye-line" id="toggleIcon"></i>
                </button>
            </div>
        </div>

        <!-- REMEMBER -->
        <div class="remember-forgot">
            <div>
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe">Remember me</label>
            </div>
            <a href="forgotPassword.html">Forgot Password?</a>
        </div>

        <!-- ROLE -->
        <div class="input-group">
            <label>Login As</label>

            <label>
                <input type="radio" name="role" checked> User
            </label>

            <label>
                <input type="radio" name="role"> Admin
            </label>
        </div>

        <!-- BUTTON -->
        <button type="submit" class="login-btn">Sign In</button>

    </form>

    <p>Don't have an account? <a href="register.html">Register</a></p>
</div>

<script src="navbar.js"></script>
<script src="app.js"></script>
<script src="login.js"></script>

<!-- 🔥 PASSWORD TOGGLE SCRIPT -->
<script>
const passwordInput = document.getElementById("loginPassword");
const togglePassword = document.getElementById("togglePassword");
const toggleIcon = document.getElementById("toggleIcon");

togglePassword.addEventListener("click", function () {
    const isPassword = passwordInput.type === "password";

    passwordInput.type = isPassword ? "text" : "password";

    if (isPassword) {
        toggleIcon.classList.replace("ri-eye-line", "ri-eye-off-line");
    } else {
        toggleIcon.classList.replace("ri-eye-off-line", "ri-eye-line");
    }
});
</script>

</body>
</html>
