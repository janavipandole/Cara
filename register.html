<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Cara</title>

    <link rel="icon" type="image/jpg" sizes="32x32" href="images/favicon.jpg" />

    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="toast.css" />
    <link rel="stylesheet" href="register.css" />

    <link
        href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css"
        rel="stylesheet"
    />

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
</head>

<body>

    <!-- HEADER -->
    <section id="header">

        <!-- Logo -->
        <a href="index.html">
            <img src="images/logo.png" alt="Cara Logo" />
        </a>

        <div>
            <ul id="navbar">

                <!-- Home -->
                <li>
                    <a href="index.html">Home</a>
                </li>

                <!-- Shop Dropdown -->
                <li class="dropdown">
                    <a href="javascript:void(0)" class="dropdown-toggle">
                        Shop <i class="fas fa-chevron-down"></i>
                    </a>

                    <ul class="dropdown-menu">
                        <li><a href="tshirts.html">T-Shirts</a></li>
                        <li><a href="shirts.html">Shirts</a></li>
                        <li><a href="kurtis.html">Kurtis</a></li>
                        <li><a href="jeans.html">Jeans</a></li>
                        <li><a href="kids_cloth.html">Kids Clothing</a></li>
                        <li><a href="shoes.html">Shoes</a></li>
                        <li><a href="accessories.html">Accessories</a></li>
                        <li><a href="dresses.html">Dresses</a></li>
                    </ul>
                </li>

                <!-- Other Links -->
                <li><a href="blog.html">Blog</a></li>
                <li><a href="about.html">About</a></li>

                <!-- Contact Icon -->
                <li class="nav-icon">
                    <a href="contact.html" aria-label="Contact">
                        <i class="ri-customer-service-2-line"></i>
                    </a>
                </li>

                <!-- Login Icon -->
                <li class="nav-icon">
                    <a href="login.html" class="active" aria-label="Login">
                        <i class="ri-user-3-line"></i>
                    </a>
                </li>

                <!-- Cart Icon -->
                <li class="nav-icon">
                    <a href="cart.html" id="lg-bag" aria-label="Cart">
                        <i class="ri-shopping-bag-4-line"></i>
                    </a>
                </li>

                <!-- Theme Toggle -->
                <li class="nav-icon">
                    <button
                        class="theme-toggle"
                        id="themeToggle"
                        aria-label="Toggle dark mode"
                    >
                        <i class="ri-moon-line" id="themeIcon"></i>
                    </button>
                </li>

                <!-- Close Button -->
                <a href="#" id="close">
                    <i class="fa-solid fa-xmark"></i>
                </a>

            </ul>
        </div>

        <!-- Mobile Navbar -->
        <div class="mobile">

            <!-- Login -->
            <a href="login.html" aria-label="Login">
                <i class="ri-user-3-line"></i>
            </a>

            <!-- Cart -->
            <a href="cart.html" aria-label="Cart">
                <i class="ri-shopping-bag-4-line"></i>
            </a>

            <!-- Hamburger -->
            <i
                class="fas fa-outdent"
                id="bar"
                role="button"
                aria-label="Open menu"
                aria-expanded="false"
                tabindex="0"
            ></i>

        </div>

    </section>

    <!-- REGISTER SECTION -->
    <section id="register-section">

        <div class="auth-card">

            <h2>Register</h2>

            <p class="subtitle">
                Create your account 😊
            </p>

            <form id="registerForm" novalidate>

                <!-- FULL NAME -->
                <div class="form-group">
                    <label for="registerUsername">Full Name</label>

                    <input
                        type="text"
                        id="registerUsername"
                        placeholder="Enter your full name"
                        required
                    />
                </div>

                <!-- EMAIL -->
                <div class="form-group">
                    <label for="registerEmail">Email</label>

                    <input
                        type="email"
                        id="registerEmail"
                        placeholder="Enter your email"
                        required
                    />
                </div>

                <!-- PASSWORD -->
                <div class="form-group">
                    <label for="registerPassword">Password</label>

                    <div class="password-wrapper">

                        <input
                            type="password"
                            id="registerPassword"
                            placeholder="Enter your password"
                            required
                        />

                        <i class="ri-eye-line toggle-eye"></i>

                    </div>
                </div>

                <!-- CONFIRM PASSWORD -->
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>

                    <div class="password-wrapper">

                        <input
                            type="password"
                            id="confirmPassword"
                            placeholder="Confirm your password"
                            required
                        />

                        <i class="ri-eye-line toggle-eye"></i>

                    </div>
                </div>

                <!-- SUBMIT BUTTON -->
                <button type="submit" class="btn-primary">
                    CREATE ACCOUNT
                </button>

            </form>

            <!-- LOGIN LINK -->
            <div class="switch-auth">

                Already have an account?

                <a href="login.html">
                    Login
                </a>

            </div>

        </div>

    </section>

    <!-- PASSWORD TOGGLE SCRIPT -->
    <script>
        const toggleEyes = document.querySelectorAll(".toggle-eye");

        toggleEyes.forEach((eye) => {

            eye.addEventListener("click", () => {

                const passwordInput = eye.previousElementSibling;

                if (passwordInput.type === "password") {

                    passwordInput.type = "text";

                    eye.classList.remove("ri-eye-line");
                    eye.classList.add("ri-eye-off-line");

                } else {

                    passwordInput.type = "password";

                    eye.classList.remove("ri-eye-off-line");
                    eye.classList.add("ri-eye-line");
                }

            });

        });
    </script>

    <script src="app.js?v=1779120917218"></script>
    <script src="register.js"></script>

</body>

</html>
