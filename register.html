</head>

<body>
<!-- Header Section -->
<section id="header">
    <a href="index.html">
        <img id="siteLogo" src="images/logo.png" alt="Cara Logo" />
    </a>

    <!-- Navigation Bar -->
    <div>
        <ul id="navbar">
          <li><a href="index.html">Home</a></li>
          <li><a href="shop.html">Shop</a></li>
          <li><a href="blog.html">Blog</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="try-on.html">Try-On</a></li>
          <li><a href="community.html">Community</a></li>
          <li><a href="promotions.html">Promotions</a></li>
          <li class="nav-icon">
            <a href="contact.html" aria-label="Contact"><i class="ri-customer-service-2-line"></i></a>
          </li>
          <li class="nav-icon">
            <a class="active" href="login.html" aria-label="Login"><i class="ri-user-3-line"></i></a>
          </li>
          <li class="nav-icon">
            <a href="cart.html" id="lg-bag" aria-label="Cart"><i class="ri-shopping-bag-4-line"></i></a>
          </li>
          <li class="nav-icon">
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
              <i class="ri-moon-line" id="themeIcon"></i>

          </li>
          <a href="#" id="close" aria-label="Close menu"><i class="fa-solid fa-xmark"></i></a>
        </ul>

        <a href="login.html" aria-label="Login"><i class="ri-user-3-line"></i></a>

      <!-- Theme Toggle -->
      <button class="theme-toggle" id="themeToggleMobile" aria-label="Toggle dark mode">
        <i class="ri-moon-line" id="themeIconMobile"></i>
      </button>
    </div>
</section>

    <!-- Toast container — overlays everything -->
    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <section id="register-section">
      <div class="register-page-wrapper">

        <!-- Back button: top-left, in normal document flow -->
        <a href="index.html" class="back-button">&#8592; Back to Shop</a>

        <div class="auth-card">
          <h2>Register</h2>
          <p class="subtitle">Create your account <i class="fas fa-smile"></i></p>
          <p class="required-note">Fields marked with * are required.</p>

          <form id="registerForm" novalidate>

            <!-- Full Name -->
            <div class="form-group">
              <label for="registerUsername">Full Name <span class="required">*</span></label>
              <input
                type="text"
                id="registerUsername"
                name="name"
                placeholder="Enter your full name"
                required
                autocomplete="name"
              />
              <!-- JS populates this when the field fails validation -->
              <span class="error-message" id="nameError"></span>
            </div>

            <!-- Email -->
            <div class="form-group">
              <label for="registerEmail">Email <span class="required">*</span></label>
              <input
                type="email"
                id="registerEmail"
                name="email"
                placeholder="Enter your email"
                required
                autocomplete="email"
              />
              <span class="error-message" id="emailError"></span>
            </div>

            <!-- Password -->
            <div class="form-group">
              <label for="registerPassword">Password <span class="required">*</span></label>
              <div class="password-wrapper">
                <input
                  type="password"
                  id="registerPassword"
                  name="password"
                  placeholder="Enter your password"
                  required
                  autocomplete="new-password"
                />
                <button type="button" id="togglePassword" class="toggle-eye" aria-label="Toggle password visibility">
                  <i class="ri-eye-line" id="registerToggleIcon"></i>
                </button>
              </div>
              <small>Use at least 8 characters with a number.</small>
              <span class="error-message" id="passwordError"></span>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
              <label for="confirmPassword">Confirm Password <span class="required">*</span></label>
              <div class="password-wrapper">
                <input
                  type="password"
                  id="confirmPassword"
                  name="confirmPassword"
                  placeholder="Confirm your password"
                  required
                  autocomplete="new-password"
                />
                <button type="button" id="confirmTogglePassword" class="toggle-eye" aria-label="Toggle confirm password visibility">
                  <i class="ri-eye-line" id="confirmToggleIcon"></i>
                </button>
              </div>
              <!-- confirmHint shows live "match / no match" as they type -->
              <small id="confirmHint"></small>
              <span class="error-message" id="confirmError"></span>
            </div>

            <!-- Shopping Preferences -->
            <div class="form-group">
              <label>Shopping Preferences</label>
              <div class="preferences-group">
                <label class="pref-item">
                  <input type="checkbox" name="interest" value="menswear" /> Menswear
                </label>
                <label class="pref-item">
                  <input type="checkbox" name="interest" value="womenswear" /> Womenswear
                </label>
                <label class="pref-item">
                  <input type="checkbox" name="interest" value="accessories" /> Accessories
                </label>
              </div>
            </div>

            <!-- Submit -->
            <button type="button" id="registerSubmitBtn" class="btn-primary">
              CREATE ACCOUNT
            </button>

            <div class="switch-auth">
              Already have an account? <a href="login.html">Login</a>
            </div>

          </form>
        </div><!-- end .auth-card -->
      </div><!-- end .register-page-wrapper -->
    </section>

<!-- Footer Section -->
<footer id="footer"></footer>

  </body>
</html>
