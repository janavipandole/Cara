name: PR Title Quality Lint

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  lint:
    name: Lint PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Validate Conventional Commits Title
        uses: amannn/action-semantic-pull-request@v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
