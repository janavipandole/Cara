name: Issue Labeler
on:
  issues:
    types: [opened]
jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = context.payload.issue.body ? context.payload.issue.body.toLowerCase() : "";
            let labels = [];
            if (title.includes("bug") || body.includes("bug")) labels.push("bug");
            if (title.includes("feat") || body.includes("feat") || title.includes("enhance")) labels.push("enhancement");
            if (title.includes("doc") || body.includes("doc")) labels.push("documentation");
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: labels
              });
            }
