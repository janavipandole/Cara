name: Issue Labeler

on:
  issues:
    types: [opened]

jobs:
  label-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = context.payload.issue.body?.toLowerCase() || '';
            const combined = title + ' ' + body;

            const labels = [];

            const bugKeywords = ['bug', 'error', 'crash', 'broken', 'fix'];
            const enhancementKeywords = ['feature', 'enhancement', 'improve', 'add'];
            const docsKeywords = ['docs', 'documentation', 'readme', 'typo'];

            if (bugKeywords.some(kw => combined.includes(kw))) {
              labels.push('bug');
            }
            if (enhancementKeywords.some(kw => combined.includes(kw))) {
              labels.push('enhancement');
            }
            if (docsKeywords.some(kw => combined.includes(kw))) {
              labels.push('documentation');
            }

            if (labels.length === 0) {
              labels.push('needs-triage');
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: labels
            });
