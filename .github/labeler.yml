# PR Labeler Configuration
# Automatically labels PRs based on file paths changed

frontend:
  - any: ['*.html', '*.css', '*.js', 'assets/**', 'images/**']

backend:
  - any: ['backend/**', '*.json']

documentation:
  - any: ['docs/**', '*.md', 'README.md']

styles:
  - any: ['**/*.css']

scripts:
  - any: ['**/*.js']

bug:
  - body: ['bug', 'broken', 'crash', 'error', 'issue']

enhancement:
  - body: ['feature', 'improvement', 'enhancement']

chore:
  - any: ['package.json', 'package-lock.json', 'node_modules/**']

security:
  - body: ['security', 'vulnerability', 'CVE']
