<!doctype html>
<html lang="en">

<head>
  <!-- Character Encoding -->
  <meta charset="UTF-8" />

  <!-- Viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Title -->
  <title>Contact Us | Cara — Modern E-Commerce</title>

  <!-- Favicon -->
  <link rel="icon" type="image/jpg" sizes="32x32" href="images/favicon.jpg" />

  <!-- SEO -->
  <meta name="description"
    content="Get in touch with Cara. We'd love to hear from you — contact our support team for inquiries or collaborations." />
  <meta name="keywords"
    content="contact, support, Cara, help, e-commerce, reach us, Cara store" />
  <meta name="author" content="Cara" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph -->
  <meta property="og:title" content="Contact Us | Cara — Modern E-Commerce" />
  <meta property="og:description"
    content="Reach out to Cara — our team is here to help with any questions or feedback." />
  <meta property="og:image" content="https://example.com/images/preview.jpg" />
  <meta property="og:url" content="https://example.com/contact" />
  <meta property="og:type" content="website" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Contact Us | Cara — Modern E-Commerce" />
  <meta name="twitter:description"
    content="We’re here to help — contact Cara for assistance or feedback." />
  <meta name="twitter:image" content="https://example.com/images/preview.jpg" />

  <!-- Theme -->
  <meta name="theme-color" content="#000000" />

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    crossorigin="anonymous" />

  <style>
    /* HEADER */
    #header {
      position: sticky;
      top: 0;
      z-index: 9999;
      background: #fff;
      width: 100%;
    }

    /* FEATURES */
    .features {
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 60px 80px;
      flex-wrap: wrap;
    }

    .feature-card {
      background: #f7f7f7;
      border: 1px solid #cde7d8;
      border-radius: 14px;
      width: 300px;
      padding: 30px 25px;
      text-align: center;
      transition: 0.3s;
    }

    .feature-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
    }

    .feature-card i {
      font-size: 34px;
      color: #088178;
      margin-bottom: 15px;
    }

    /* CONTACT LAYOUT */
    .contact-container {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 30px;
      padding: 40px;
    }

    @media (max-width: 992px) {
      .contact-container {
        grid-template-columns: 1fr;
      }
    }

    /* FORM */
    .contact-form {
      display: flex;
      flex-direction: column;
    }

    .contact-form input,
    .contact-form textarea,
    .contact-form select {
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .contact-form input:focus,
    .contact-form textarea:focus {
      border-color: #088178;
      outline: none;
    }

    /* BUTTON */
    button.normal {
      background: #088178;
      color: white;
      padding: 12px;
      border: none;
      cursor: pointer;
      transition: 0.3s;
    }

    button.normal:hover {
      background: #066c65;
    }

    /* ERRORS */
    .error-msg {
      color: red;
      font-size: 12px;
    }

    .input-error {
      border-color: red !important;
    }

    /* LOADING */
    .btn-loading {
      opacity: 0.7;
      pointer-events: none;
      position: relative;
    }

    .btn-loading::after {
      content: "";
      width: 15px;
      height: 15px;
      border: 2px solid white;
      border-top: transparent;
      border-radius: 50%;
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: translateY(-50%) rotate(360deg); }
    }

    /* FOOTER */
    footer {
      background: #f3f3f3;
      padding: 40px 80px;
    }

    footer .col {
      display: flex;
      flex-direction: column;
    }

    footer a {
      text-decoration: none;
      color: #222;
    }

    footer a:hover {
      color: #088178;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <section id="header">
    <a href="index.html">
      <img src="images/logo.png" alt="Cara Logo" />
    </a>

    <ul id="navbar">
      <li><a href="index.html">Home</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="community.html">Community</a></li>
      <li><a class="active" href="contact.html">Contact</a></li>
    </ul>
  </section>

  <!-- HERO -->
  <section id="about-head">
    <h2>#Let's_Talk</h2>
    <p>We’d love to hear from you!</p>
  </section>

  <!-- CONTACT -->
  <section class="contact-container">

    <!-- LEFT -->
    <div>
      <section class="features">
        <div class="feature-card">
          <i class="fas fa-clock"></i>
          <h3>Fast Response</h3>
          <p>Replies within 24 hours.</p>
        </div>

        <div class="feature-card">
          <i class="fas fa-headset"></i>
          <h3>Support</h3>
          <p>Always here to help.</p>
        </div>

        <div class="feature-card">
          <i class="fas fa-shield-alt"></i>
          <h3>Secure</h3>
          <p>Safe communication.</p>
        </div>
      </section>

      <form class="contact-form">
        <input id="name" placeholder="Name" />
        <input id="email" placeholder="Email" />
        <textarea id="message" placeholder="Message"></textarea>

        <button type="submit" class="normal">Send</button>
        <div id="form-status"></div>
      </form>
    </div>

    <!-- RIGHT -->
    <div>
      <p><b>Head Office</b></p>
      <p>Mumbai, India</p>
    </div>

  </section>

  <!-- FOOTER -->
  <footer>
    <div class="col">
      <img src="images/logo.png" alt="Logo" />
      <p>Contact us anytime</p>
    </div>

    <div class="copyright">
      <p>© Cara 2026</p>
    </div>
  </footer>

  <!-- JS -->
  <script src="app.js"></script>

  <script>
    const form = document.querySelector(".contact-form");

    form.addEventListener("submit", (e) => {
      e.preventDefault();

      const name = document.getElementById("name");
      const email = document.getElementById("email");
      const message = document.getElementById("message");

      let valid = true;

      if (!name.value) valid = false;
      if (!email.value.includes("@")) valid = false;
      if (message.value.length < 10) valid = false;

      if (valid) {
        const btn = form.querySelector("button");
        btn.classList.add("btn-loading");

        setTimeout(() => {
          btn.classList.remove("btn-loading");
          form.reset();
          document.getElementById("form-status").innerText =
            "Message sent successfully!";
        }, 1200);
      }
    });
  </script>

</body>
</html>
