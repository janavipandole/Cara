<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Cart | Cara</title>
    <link rel="icon" type="image/jpg" sizes="32x32" href="images/favicon.jpg" />
    <meta name="description" content="Shop the latest trends on our e-commerce store." />
    <meta name="keywords" content="e-commerce, shopping, online store, dark mode, buy online, latest fashion" />
    <meta name="author" content="Cara" />
    <meta name="robots" content="index, follow" />
    <meta http-equiv="Content-Language" content="en" />
    <meta property="og:title" content="E-commerce - Dark Theme Working" />
    <meta property="og:description" content="Shop the latest trends with our dark mode-enabled e-commerce experience." />
    <meta property="og:image" content="https://example.com/images/preview.jpg" />
    <meta property="og:url" content="https://example.com/" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="E-commerce - Dark Theme Working" />
    <meta name="twitter:description" content="Dark theme e-commerce site with modern features." />
    <meta name="twitter:image" content="https://example.com/images/preview.jpg" />
    <meta name="twitter:site" content="@janavipandole" />
    <meta name="theme-color" content="#000000" />
    <link rel="stylesheet" href="style.css" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
      integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
      crossorigin="anonymous" referrerpolicy="no-referrer" />
  </head>

  <body>

    <!-- Header -->
    <section id="header">
      <a href="index.html">
        <img src="images/logo.png" alt="Cara Logo" id="siteLogo">
      </a>

      <div id="navbar-container"></div>

      <div class="mobile">
        <button class="theme-toggle" id="themeToggleMobile" aria-label="Toggle dark mode">
          <i class="ri-moon-line" id="themeIconMobile"></i>
        </button>
        <a href="cart.html">
          <i class="ri-shopping-bag-4-line"></i>
          <span class="cart-count" id="mobileCartCount">0</span>
        </a>
        <i class="fas fa-outdent" id="bar"></i>
      </div>
    </section>

    <!-- Cart Content -->
    <div id="cart-content-wrapper">
      <div class="cartmain">

        <section id="page-header">
          <h2>Your Cart</h2>
          <p>Review and manage your selected items</p>
        </section>

        <section id="cart" class="section-p1">
          <table width="100%">
            <thead>
              <tr>
                <td>Remove</td>
                <td>Image</td>
                <td>Product</td>
                <td>Price</td>
                <td>Quantity</td>
                <td>Subtotal</td>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </section>

        <section id="cart-actions" class="section-p1">
          <div class="cart-buttons">
            <a href="shop.html" class="normal">Continue Shopping</a>
            <a href="checkout.html" class="normal">Proceed to Checkout</a>
          </div>
        </section>

      </div>
    </div>

    <!-- Empty Cart State -->
    <div id="empty-cart-container" style="display: none; text-align: center; padding: 100px 20px">
      <div style="font-size: 80px; margin-bottom: 20px">🛒</div>
      <h2 style="font-size: 32px; margin-bottom: 10px">Your Cart is Empty!</h2>
      <p style="color: #747d8c; font-size: 18px; margin-bottom: 30px">
        Looks like you haven't added anything to your cart yet.
      </p>
      <a href="shop.html" class="normal" style="background-color: #088178; color: white; padding: 15px 30px;
        text-decoration: none; border-radius: 4px; font-weight: 600;">
        Return to Shop
      </a>
    </div>

    <!-- Footer -->
    <div id="footer-container"></div>

    <div id="toast-container"></div>

    <script src="footer.js"></script>
    <script>loadFooter();</script>
    <script src="app.js"></script>
    <script src="navbar.js"></script>
    <script>loadNavbar('cart');</script>
  </body>
</html>
