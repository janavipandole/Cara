<head>

    <!-- Page Title -->

    <!-- Twitter Card Tags -->

    <meta name="twitter:title" content="E-commerce - Dark Theme Working">

    <meta name="twitter:image" content="https://example.com/images/preview.jpg">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">

<body>
    <div id="header-placeholder"></div>

    <section id="page-header">
        <h2>Your Cart</h2>
        <p>Review and manage your selected items</p>
    </section>

    <section id="cart" class="section-p1">
        <table width="100%">
            <thead>
                <tr>
                    <td>Remove</td>
                    <td>Image</td>
                    <td>Product</td>
                    <td>Price</td>
                    <td>Quantity</td>
                    <td>Subtotal</td>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </section>

    <section id="cart-actions" class="section-p1">
        <div class="cart-buttons">
            <a href="shop.html" class="normal">Continue Shopping</a>
            <!-- csritik-max -->
            <button class="normal" onclick="showToast('Proceeding to checkout…')">Proceed to Checkout</button>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="js/loader.js"></script>
    <script src="js/app.js"></script>
<!-- csritik-max -->
<div class="toast" id="toast">
    <div class="toast-icon" id="toast-icon">✅</div>
    <span id="toast-msg"></span>
</div>
